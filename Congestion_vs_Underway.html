const svg = d3.select('#map');
const W_ = window.innerWidth;
const H_ = window.innerHeight;
svg.attr('viewBox', `0 0 ${W_} ${H_}`);

  .scale(W_/6.2)
  .translate([W_/2, H_/2+H_*0.05]);
const path = d3.geoPath(proj);

svg.append('rect').attr('width',W_).attr('height',H_).attr('fill','#071523');

let underway = U.map(v => {
  const [x,y] = proj([v.lo, v.la]);
  if(!x||!y||isNaN(x)||isNaN(y)) return null;
  const r = (v.h - 90) * Math.PI / 180;
  const sp = v.s * 0.012;
  return {x, y, ox:x, oy:y, vx:Math.cos(r)*sp, vy:Math.sin(r)*sp, h:v.h};
}).filter(Boolean);

let waiting = W.map(v => {
  const [x,y] = proj([v.lo, v.la]);
  if(!x||!y||isNaN(x)||isNaN(y)) return null;
  return {x, y};
}).filter(Boolean);

    .join('path').attr('d', path)
    .attr('fill','#112233').attr('stroke','#1a3a5a').attr('stroke-width',0.5);

  svg.append('g').selectAll('circle.w')
    .data(waiting).join('circle').attr('class','w')
    .attr('cx', d=>d.x).attr('cy', d=>d.y)
    .attr('r', 2.5)
    .attr('fill','#E24B4A')
    .attr('opacity', 0.85);

  function boatPath(x, y, hdg, sz) {
    const r = (hdg - 90) * Math.PI / 180;
    const pts = [[0,-sz*2],[sz*0.9,sz],[0,sz*0.5],[-sz*0.9,sz]];
    return pts.map(([px,py],i) => {
      const rx = x + px*Math.cos(r) - py*Math.sin(r);
      const ry = y + px*Math.sin(r) + py*Math.cos(r);
      return (i===0?'M':'L') + rx.toFixed(1)+','+ry.toFixed(1);
    }).join('') + 'Z';
  }

  const boats = svg.append('g').selectAll('path.u')
    .data(underway).join('path').attr('class','u')
    .attr('d', d => boatPath(d.x, d.y, d.h, 3))
    .attr('fill','#378ADD')
    .attr('opacity', 0.9);

  function animate() {
    requestAnimationFrame(animate);
    underway.forEach(v => {
      v.x += v.vx;
      v.y += v.vy;
      if(Math.abs(v.x-v.ox)>90 || Math.abs(v.y-v.oy)>70) {
        v.x = v.ox; v.y = v.oy;
      }
    });
    boats.data(underway).attr('d', d => boatPath(d.x, d.y, d.h, 3));
  }
  animate();
});
